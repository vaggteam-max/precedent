<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Precedent — Opening</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #150a17;
    --bg-2: #241028;
    --white: #f7f4f8;
    --dim: #9d8aa3;
    --sl-blue: #36c5f0;
    --sl-green: #2eb67d;
    --sl-red: #e01e5a;
    --sl-yellow: #ecb22e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Bricolage Grotesque', sans-serif;
    display: grid; place-items: center;
    position: relative;
  }

  /* aurora glow blobs in Slack colors */
  .aurora { position: fixed; inset: 0; pointer-events: none; filter: blur(90px); opacity: 0.5; }
  .blob { position: absolute; border-radius: 50%; animation: drift 14s ease-in-out infinite alternate; }
  .b1 { width: 44vw; height: 44vw; background: radial-gradient(circle, var(--sl-blue), transparent 70%); top: -18vw; left: -10vw; }
  .b2 { width: 40vw; height: 40vw; background: radial-gradient(circle, var(--sl-red), transparent 70%); bottom: -16vw; right: -8vw; animation-delay: -5s; }
  .b3 { width: 30vw; height: 30vw; background: radial-gradient(circle, var(--sl-green), transparent 70%); bottom: -10vw; left: 16vw; animation-delay: -9s; opacity: 0.8; }
  .b4 { width: 24vw; height: 24vw; background: radial-gradient(circle, var(--sl-yellow), transparent 70%); top: -6vw; right: 18vw; animation-delay: -3s; opacity: 0.6; }
  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(4vw, 3vh) scale(1.15); }
  }
  .veil { position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 110% 90% at 50% 50%, transparent 40%, rgba(21,10,23,0.85) 100%); }

  .card { text-align: center; position: relative; z-index: 1; padding: 0 6vw; }

  /* the mark: a hash of rounded bars in Slack colors */
  .mark { width: clamp(64px, 6.4vw, 104px); height: auto; margin: 0 auto 4vh; display: block;
    opacity: 0; transform: scale(0.6) rotate(-12deg);
    animation: pop 1.1s cubic-bezier(0.34,1.56,0.64,1) 0.25s forwards; }
  @keyframes pop { to { opacity: 1; transform: scale(1) rotate(0deg); } }

  .eyebrow {
    font-family: 'Manrope', sans-serif; font-weight: 600;
    font-size: clamp(12px, 1vw, 18px);
    letter-spacing: 0.42em; text-transform: uppercase; color: var(--dim);
    padding-left: 0.42em;
    opacity: 0; animation: fadeUp 1s ease 0.7s forwards;
  }

  h1 {
    font-size: clamp(72px, 10.5vw, 200px);
    font-weight: 750;
    font-variation-settings: 'opsz' 96;
    letter-spacing: -0.03em;
    line-height: 1.04;
    margin: 1.6vh 0 0;
    opacity: 0; transform: translateY(30px);
    animation: fadeUp 1.2s cubic-bezier(0.19,1,0.22,1) 0.95s forwards;
  }

  /* gradient sweep underline */
  .sweep {
    height: clamp(6px, 0.6vw, 11px); border-radius: 99px;
    width: 0; margin: 2.8vh auto 0;
    background: linear-gradient(90deg, var(--sl-blue), var(--sl-green), var(--sl-yellow), var(--sl-red));
    animation: sweep 1.2s cubic-bezier(0.19,1,0.22,1) 1.5s forwards;
  }
  @keyframes sweep { to { width: min(520px, 40vw); } }

  .sub {
    font-family: 'Manrope', sans-serif; font-weight: 500;
    font-size: clamp(18px, 1.8vw, 34px);
    color: var(--white); opacity: 0;
    margin-top: 3.6vh;
    animation: fadeUp 1.1s ease 1.9s forwards;
  }
  .sub .hl-green { color: var(--sl-green); font-weight: 600; }
  .sub .hl-blue { color: var(--sl-blue); font-weight: 600; }

  .kicker {
    font-family: 'Manrope', sans-serif; font-weight: 500;
    font-size: clamp(12px, 1vw, 18px);
    letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim);
    padding-left: 0.3em; margin-top: 5vh;
    opacity: 0; animation: fadeUp 1.1s ease 2.4s forwards;
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <div class="aurora">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
  </div>
  <div class="veil"></div>

  <main class="card">
    <svg class="mark" viewBox="0 0 100 100" fill="none" stroke-width="11" stroke-linecap="round">
      <line x1="36" y1="16" x2="28" y2="84" stroke="#36c5f0" />
      <line x1="72" y1="16" x2="64" y2="84" stroke="#2eb67d" />
      <line x1="16" y1="38" x2="86" y2="38" stroke="#ecb22e" />
      <line x1="14" y1="66" x2="84" y2="66" stroke="#e01e5a" />
    </svg>

    <p class="eyebrow">Meet your team's memory</p>
    <h1>Precedent</h1>
    <div class="sweep"></div>
    <p class="sub">The agent that remembers every <span class="hl-green">decision</span> and every <span class="hl-blue">commitment</span> — right inside Slack.</p>
    <p class="kicker">Slack Agent Builder Challenge · 2026</p>
  </main>
</body>
</html>
